title:
  ru: Вставить проем
  en_us: Insert opening

tooltip:
  ru: >-
    Плагин автоматически вставляет экземпляр проема в стену, и задает его габариты, исходя из габаритов витража.
    Плагин работает как  с группой витража, так и с отдельными витражами.
    
    
    До запуска нужно убедиться, что группа витража находится в толще стены  
    (в том месте, куда необходимо вставить проем).
    Перед запуском плагина нужно выбрать группу витража.
  en_us: >-
    The plugin automatically inserts an opening instance into the wall 
    and sets its dimensions based on the dimensions of the stained glass window. 
    The plugin works with both a stained glass window group and individual stained glass windows.


    Before launching, you need to make sure that the stained glass window group 
    is in the thickness of the wall (in the place where you need to insert the opening). 
    Before launching the plugin, you need to select a stained glass window group.

engine:
  clean: false

