title:
  ru: Маркировка
  en_us: Marking

tooltip:
  ru: >-
    Маркирует группы витражей исходя из их площади и имени типа группы по возрастанию.
    В результате работы скрипта, заполнится параметр  "ФОП_Марка типа".
    
    
    Перед запуском плагина необходимо выделить группы витражей для маркировки.
  en_us: >-
    Labels groups of stained glass windows based on their area and group type name in ascending order.
    As a result of the script's execution, the parameter "ФОП_Марка типа" will be filled.
    
    
    Before running the plugin, you need to select groups of stained glass windows for marking.


author: KozlovP
help_url: "https://kb.a101.ru/pages/viewpage.action?pageId=134097154"

min_revit_version: 2022
max_revit_version: 2024