title:
  ru: Описание
  en_us: Description

tooltip:
  ru: >-
    Плагин записывает описание витража, состав створок, профиль, остекление, характеристики витража
    в параметр "ФОП_Описание типа".
    
    
    Перед запуском плагина необходимо выбрать группу витража.
  en_us: >-
    The plugin records the description of the stained glass window, 
    the composition of the sashes, the profile, the glazing, 
    and the characteristics of the stained glass window in the parameter "ФОП_Описание типа".


    Before running the plugin, you need to select a stained glass group.

author: KozlovPS
