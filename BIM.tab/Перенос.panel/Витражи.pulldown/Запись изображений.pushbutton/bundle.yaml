title:
  ru: Запись изображений
  en_us: Recording images

tooltip:
  ru: >-
    Плагин автоматически экспортирует чертежные виды, затем импортирует их в проект, 
    и присваивает выбранным группам витражей. В результате работы скрипта, 
    заполнятся параметр типа группы витража "ФОП_Изображение типа".
    
    
    Перед запуском плагина необходимо выбрать группу витража.
  en_us: >-
    The plugin automatically exports drawing views, then imports them 
    into the project and assigns them to the selected stained glass groups. 
    As a result of the script, the stained glass group type parameter 
    "ФОП_Изображение типа" will be filled.
    
    
    Before running the plugin, you need to select a stained glass group.

engine:
  clean: false

