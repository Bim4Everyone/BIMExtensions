title:
  ru: Окна. Открывание
  en_us: Windows. Opening information

tooltip:
  ru: >-
    Заполняет информацию об открывании у окон.
    Заполняемые параметры:
    
    -"ФОП_Открывание По умолчанию";
    
    - "ФОП_Зеркальный элемент";
    
    - "ФОП_Открывание Полное";
    
    - "ФОП_Открывание ГОСТ";
    
    - "ФОП_Открывание".
  en_us: >-
    Fills in information about opening at the windows. 
    Filled in parameters:
    
    -"ФОП_Открывание По умолчанию";

    - "ФОП_Зеркальный элемент";

    - "ФОП_Открывание Полное";

    - "ФОП_Открывание ГОСТ";

    - "ФОП_Открывание".

