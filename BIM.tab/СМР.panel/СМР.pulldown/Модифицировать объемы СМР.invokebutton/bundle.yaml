title:
  ru: Модифицировать объемы СМР
  en_us: Volume SMR modifier

tooltip:
  ru: >-
    Скрипт позволяет объединять эелементы в один элемент, разделять элемент в разных режимах: по горизонтальной точке,
    по вертикальной точке, по граням. Также можно вырезать один элемент из другого. Категория элементов - Обобщенные модели,
    созданные плагином по построению, модели в контексте.
 
    
    1. Запустите скрипт.

    2. Проверьте параметры, при необходимости добавьте в проект.

    3. Выберите объемные элементы.
    
    4. Нажмите соотвествующие кнопки по объединению, разделению или вырезанию.

    5. В режимах разделения или вырезания выберите точки, или объемы для вырезания.
    
    6. После выбора точек, объемов для вырезания операция произойдет автоматически.
    
    7. Статус операции будет указан на кнопках цветом и подсказкой (при наведении на кнопку).


  en_us: >-
    The script allows you to merge elements into a single element and split an element in different modes: by a horizontal point, 
    by a vertical point, and by faces. It also allows cutting one element from another. The element category is Generic Models 
    created by the modeling plugin, including in-place models.

    1. Run the script.
    
    2. Check the parameters; add them to the project if necessary.
    
    3. Select solid elements.
    
    4. Click the corresponding buttons for merging, splitting, or cutting.
    
    5. In splitting or cutting modes, select points or volumes to cut.
    
    6. After selecting the points or cutting volumes, the operation will be performed automatically.
    
    7. The operation status will be indicated on the buttons by color and tooltip (when hovering over the button).

assembly: RevitVolumeModifier.dll
command_class: RevitVolumeModifierCommand

author: KozlovPS

min_revit_version: 2022
max_revit_version: 2024