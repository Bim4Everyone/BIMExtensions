title:
  ru: Разделить по уровню СМР
  en_us: Split by level SMR

tooltip:
  ru: >- 
    Плагин разделяет элементы заданных категорий по этажам.
    
    1. Запустите плагин.
    
    2. Задайте настройки для разделения элементов по уровням.
    
    2. Нажмите "ОК".
  en_us: >- 
    The plugin separates elements of specified categories by floors.
    
    1. Run the plugin.
    
    2. Configure the settings for separating elements by levels.
    
    2. Click "OK."

assembly: RevitSplitMepCurve.dll
command_class: RevitSplitMepCurveCommand

author: vlastroG

min_revit_version: 2022
max_revit_version: 2024
